name: Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install deps
        run: |
          # Legacy peer graph is not npm 10-clean; remove after dependency refresh.
          npm ci --legacy-peer-deps

      - name: Test
        run: |
          npm run lint
